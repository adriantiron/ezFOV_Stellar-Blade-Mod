; =================================================================================
; ALTERNATIVE CAMERA SYSTEM CONFIGURATION
;
; THE COORDINATE MATRIX SYSTEMS:
;
;   1) FOR STANDARD MODES (Default, Combat, Idle, Walk, Sprint):
;      Uses Unreal's Local Attachment Space:
;      X = Forward & Backward / Depth (+In / -Out) -> Acts like a zoom!
;      Y = Sideways / Lateral Offset (+Right / -Left)
;      Z = Up & Down / Height (+Up / -Down)
;
;   2) FOR LOCK-ON MODE ONLY (Rotation-Corrected Matrix):
;      X = Sideways / Lateral Offset (+Right / -Left)
;      Y = Depth Offset (Keep at 0.0 to maintain tight orbital target tracking)
;      Z = Up & Down / Height (+Up / -Down)
;
; GLOBAL CORE HOTKEYS:
;   [F8]                    = Live Reload configuration file changes instantly
; =================================================================================

; ---------------------------------------------------------------------------------
; CAMERA COLLISION
; Prevents the camera from clipping or snapping aggressively forward when hitting 
; walls or geometry. Set to true for an unhindered cinematic presentation.
; ---------------------------------------------------------------------------------
DisableCameraCollision=false

; ---------------------------------------------------------------------------------
; DEFAULT CAMERA OFFSETS (Exploration & Idle)
; ---------------------------------------------------------------------------------
DefaultCamX=0.0000
DefaultCamY=0.0000
DefaultCamZ=0.0000

; ---------------------------------------------------------------------------------
; COMBAT CAMERA OFFSETS (Un-locked Combat Engagement)
; Pulls back or shifts the camera dynamically when weapons are drawn in battle.
; ---------------------------------------------------------------------------------
CombatCamX=0.0000
CombatCamY=0.0000
CombatCamZ=0.0000

; ---------------------------------------------------------------------------------
; LOCK-ON CAMERA OFFSETS (Target Tracking Mode)
; ---------------------------------------------------------------------------------
LockOnCamX=0.0000
LockOnCamY=0.0000
LockOnCamZ=0.0000

; ---------------------------------------------------------------------------------
; LOCK-ON CAMERA BIASES (Target Framing Rotation & Tilt in Degrees)
; ---------------------------------------------------------------------------------
; LockOnYawBias (Horizontal Framing):
;   Rotates the camera view horizontally around the target.
;   Positive (+) = Shifts enemy target RIGHT on screen (+1°)
;   Negative (-) = Shifts enemy target LEFT on screen (-1°)
;
;   COMPOSITION TIP: Combine LockOnCamX=60.0 with LockOnYawBias=5.0 to achieve 
;   a gorgeous over-the-shoulder split framing (Character LEFT, Enemy RIGHT).
;
; LockOnPitchBias (Vertical Framing):
;   Tilts the camera view plane vertically.
;   Positive (+) = Tilts camera down / Shifts enemy target UP (+1°)
;   Negative (-) = Tilts camera up / Shifts enemy target DOWN (-1°)
; ---------------------------------------------------------------------------------
LockOnYawBias=2.0
LockOnPitchBias=-6.0

; ---------------------------------------------------------------------------------
; IDLE CAMERA CONFIGURATION (Standing still out of combat)
; ---------------------------------------------------------------------------------
IdleCamX=200.0000
IdleCamY=0.0000
IdleCamZ=0.0000

; ---------------------------------------------------------------------------------
; WALK CAMERA OFFSETS (Cinematic Slow Walk)
; Triggers a distinct cinematic frame shift when walking slowly.
; ---------------------------------------------------------------------------------
WalkCamX=200.0000
WalkCamY=0.0000
WalkCamZ=0.0000

; ---------------------------------------------------------------------------------
; SPRINT CAMERA OFFSETS (High-Speed Traversal)
; ---------------------------------------------------------------------------------
SprintCamX=0.0000
SprintCamY=0.0000
SprintCamZ=0.0000

; ---------------------------------------------------------------------------------
; FIELD OF VIEW (FOV Settings)
; ---------------------------------------------------------------------------------
; Baseline vanilla FOV is typically around 70-75.
; Values automatically clamped between an absolute minimum of 30 and maximum of 120.
; TPSFOV = 3rd person Ranged mode. It's lower for higher accuracy while aiming...
; ---------------------------------------------------------------------------------
FOV=90
CombatFOV=90
LockOnFOV=90
TPSFOV=70
IdleFOV=90
WalkFOV=90
SprintFOV=90

; FOV Transition Smoothness (Higher numbers = slower, more cinematic pacing)
FOVTransitionSteps=60
KeyFOVTransitionSteps=20
LockOnExitBlendTime=0.16

; ---------------------------------------------------------------------------------
; FEATURE TOGGLES
; Set true to let this script control properties for that movement profile stance,
; or false to fall back entirely to vanilla camera rules for that specific state.
; ---------------------------------------------------------------------------------
EnableIdleCamera=false
EnableWalkingCamera=true
EnableSprintingCamera=true
EnableLockOnCamera=true
