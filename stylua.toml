# StyLua configuration for the ezFOV mod (dev-only tooling).
# Formatting is mechanical and enforced by the StyLua VS Code extension.
# Docs: https://github.com/JohnnyMorganz/StyLua

column_width = 120
line_endings = "Windows"
indent_type = "Spaces"
indent_width = 4
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
collapse_simple_statement = "Never"
